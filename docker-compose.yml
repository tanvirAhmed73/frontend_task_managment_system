# Starts the Next.js frontend only. Run the API on the host (port 4000) or add an `api`
# service and set NEXT_PUBLIC_* to that service name. Rebuild after changing NEXT_PUBLIC_*.
#
# Optional: cp docker.env.example .env  (Compose reads .env for ${VAR} substitution)

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://host.docker.internal:4000/api}
        NEXT_PUBLIC_SOCKET_ORIGIN: ${NEXT_PUBLIC_SOCKET_ORIGIN:-http://host.docker.internal:4000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
