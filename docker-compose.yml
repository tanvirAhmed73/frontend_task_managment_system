services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # From host machine: backend on localhost:4000 → use host gateway (Linux/Mac/Win Compose v2)
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://host.docker.internal:4000/api}
        NEXT_PUBLIC_SOCKET_ORIGIN: ${NEXT_PUBLIC_SOCKET_ORIGIN:-http://host.docker.internal:4000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
